<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>St. George's Junior Program 2026</title>
    <meta
      name="description"
      content="A web-friendly edition of the St. George's Golf & Country Club Junior Program fixture."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="password-gate" id="password-gate" aria-hidden="false">
      <div class="password-gate__backdrop"></div>
      <div class="password-gate__dialog" role="dialog" aria-modal="true" aria-labelledby="password-title">
        <p class="password-gate__eyebrow">Private Access</p>
        <h2 id="password-title" class="password-gate__title">Enter Password</h2>
        <p class="password-gate__text">This page is password protected. Enter the password to continue.</p>
        <form id="password-form" class="password-gate__form">
          <label class="password-gate__label" for="password-input">Password</label>
          <input id="password-input" class="password-gate__input" type="password" autocomplete="current-password" />
          <p id="password-error" class="password-gate__error" hidden>Incorrect password. Please try again.</p>
          <button class="password-gate__button" type="submit">Unlock Page</button>
        </form>
      </div>
    </div>

    <div class="site-shell" id="site-shell">
      <header class="hero" id="top">
        <div class="hero__media">
          <img id="hero-image" src="" alt="" />
          <div class="hero__overlay"></div>
        </div>
        <div class="hero__content">
          <p class="eyebrow" id="hero-eyebrow"></p>
          <h1 id="hero-title"></h1>
          <p class="hero__intro" id="hero-intro"></p>
          <div class="hero__actions">
            <a class="button button--primary" href="#sections">Explore the guide</a>
          </div>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="sidebar__card">
            <p class="sidebar__label">Season</p>
            <p class="sidebar__year" id="season-year"></p>
            <p class="sidebar__text" id="sidebar-summary"></p>
          </div>
          <nav class="sidebar__nav" aria-label="Section navigation">
            <p class="sidebar__label">Sections</p>
            <ul id="section-nav"></ul>
          </nav>
        </aside>

        <section class="content" id="sections">
          <div id="section-list" class="section-list"></div>
        </section>
      </main>
    </div>

    <div class="lightbox" id="lightbox" aria-hidden="true" hidden>
      <div class="lightbox__backdrop" data-lightbox-close></div>
      <div class="lightbox__dialog" role="dialog" aria-modal="true" aria-label="Expanded photo">
        <button class="lightbox__close" id="lightbox-close" type="button" aria-label="Close expanded photo">
          ×
        </button>
        <figure class="lightbox__figure">
          <img id="lightbox-image" src="" alt="" />
          <video id="lightbox-video" controls playsinline hidden></video>
          <figcaption id="lightbox-caption" class="lightbox__caption"></figcaption>
        </figure>
      </div>
    </div>

    <script src="./site-content.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
